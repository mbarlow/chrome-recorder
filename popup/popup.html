<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chrome Recorder</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                width: 280px;
                padding: 16px;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #FFFFFF;
                color: #111;
            }

            .header {
                margin-bottom: 14px;
            }

            .header h1 {
                font-size: 15px;
                font-weight: 600;
                color: #111;
            }

            .status {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 14px;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #22C55E;
                flex-shrink: 0;
                transition: background 0.2s ease;
            }

            .status-dot.recording {
                background: #EF4444;
            }

            .status-text {
                font-size: 13px;
                font-weight: 500;
                color: #555;
                transition: color 0.2s ease;
            }

            .timer {
                font-family: 'JetBrains Mono', monospace;
                font-size: 32px;
                font-weight: 500;
                text-align: center;
                padding: 12px 0;
                color: #111;
                display: none;
                transition: color 0.2s ease;
            }

            .timer.visible {
                display: block;
            }

            .toggle-btn {
                display: block;
                width: 100%;
                padding: 10px 0;
                border: 1px solid #E5E7EB;
                border-radius: 8px;
                font-family: 'Inter', sans-serif;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                background: #1A1A1A;
                color: #FFFFFF;
                transition: background 0.15s ease, border-color 0.15s ease;
            }

            .toggle-btn:hover {
                background: #333;
            }

            .toggle-btn.recording {
                background: #EF4444;
                border-color: #EF4444;
                color: #FFFFFF;
            }

            .toggle-btn.recording:hover {
                background: #DC2626;
                border-color: #DC2626;
            }

            .toggle-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .shortcut {
                text-align: center;
                font-size: 11px;
                color: #999;
                margin-top: 12px;
            }

            @media (prefers-color-scheme: dark) {
                body {
                    background: #1A1A1A;
                    color: #E5E5E5;
                }

                .header h1 {
                    color: #E5E5E5;
                }

                .status-text {
                    color: #999;
                }

                .timer {
                    color: #E5E5E5;
                }

                .toggle-btn {
                    background: #333;
                    border-color: #333;
                    color: #E5E5E5;
                }

                .toggle-btn:hover {
                    background: #444;
                }

                .toggle-btn.recording {
                    background: #EF4444;
                    border-color: #EF4444;
                    color: #FFFFFF;
                }

                .toggle-btn.recording:hover {
                    background: #DC2626;
                    border-color: #DC2626;
                }

                .shortcut {
                    color: #666;
                }
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>Chrome Recorder</h1>
        </div>

        <div class="status">
            <div class="status-dot" id="status-dot"></div>
            <span class="status-text" id="status-text">Ready</span>
        </div>

        <div class="timer" id="timer">00:00</div>

        <button class="toggle-btn" id="toggle-btn">Start Recording</button>

        <div class="shortcut">Ctrl+Shift+R (Cmd+Shift+R on Mac)</div>

        <script src="popup.js"></script>
    </body>
</html>
